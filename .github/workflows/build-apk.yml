name: Build NYT Music APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          LASTFM_API_KEY=dummy
          LASTFM_API_SECRET=dummy
          ENABLE_UPDATE_CHECK=0
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Patch NewPipeExtractor to stable version
        run: |
          echo "Finding flutter_new_pipe_extractor build.gradle..."
          find ~/.pub-cache -name "build.gradle" | xargs grep -l "NewPipeExtractor" 2>/dev/null || true
          GRADLE_FILES=$(find ~/.pub-cache -name "build.gradle" | xargs grep -l "NewPipeExtractor" 2>/dev/null)
          if [ -n "$GRADLE_FILES" ]; then
            echo "Found: $GRADLE_FILES"
            cat $GRADLE_FILES
            echo "Patching to use stable v0.24.2..."
            sed -i "s/e4e5ccc1fdef8afc684cf00cd01ecb19cc7ef4b0/v0.24.2/g" $GRADLE_FILES
            echo "After patch:"
            cat $GRADLE_FILES
          else
            echo "No build.gradle with NewPipeExtractor found"
          fi

      - name: Build APK
        run: flutter build apk --flavor stable --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NYT-Music
          path: build/app/outputs/flutter-apk/app-stable-release.apk
