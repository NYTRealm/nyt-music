name: Build NYT Music APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          LASTFM_API_KEY=dummy
          LASTFM_API_SECRET=dummy
          ENABLE_UPDATE_CHECK=0
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build NewPipeExtractor from source
        run: |
          NPE_COMMIT="e4e5ccc1fdef8afc684cf00cd01ecb19cc7ef4b0"
          git clone https://github.com/TeamNewPipe/NewPipeExtractor.git /tmp/npe
          cd /tmp/npe
          git checkout $NPE_COMMIT
          chmod +x gradlew
          # Append group/version override for local Maven publish
          echo "" >> build.gradle
          echo "allprojects { group = 'com.github.teamnewpipe'; version = '$NPE_COMMIT' }" >> build.gradle
          ./gradlew publishToMavenLocal --no-daemon -x test
          echo "Published artifacts:"
          find ~/.m2/repository/com/github/teamnewpipe -type f | head -20

      - name: Build APK
        run: flutter build apk --flavor stable --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NYT-Music
          path: build/app/outputs/flutter-apk/app-stable-release.apk
