name: Build NYT Music APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          LASTFM_API_KEY=dummy
          LASTFM_API_SECRET=dummy
          ENABLE_UPDATE_CHECK=0
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build NewPipeExtractor from source and install to Maven local
        run: |
          # Find the exact NewPipeExtractor commit the plugin needs
          CACHE_DIR=$(find ~/.pub-cache/git -maxdepth 1 -name "flutter_new_pipe_extractor*" -type d | head -1)
          NPE_COMMIT=$(grep -oP "(?<=NewPipeExtractor:)[a-f0-9]+" "$CACHE_DIR/android/build.gradle" | head -1)
          echo "NewPipeExtractor commit needed: $NPE_COMMIT"

          git clone --depth=200 https://github.com/teamnewpipe/NewPipeExtractor /tmp/npe
          cd /tmp/npe
          git checkout $NPE_COMMIT

          chmod +x gradlew
          echo "=== Building JAR (skip tests) ==="
          ./gradlew jar -x test --no-daemon 2>&1 | tail -40

          JAR=$(find . -path "*/build/libs/*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
          echo "Built JAR: $JAR"
          ls -lh "$JAR"

          echo "=== Installing to Maven local with JitPack coordinates ==="
          mvn install:install-file \
            -Dfile="$JAR" \
            -DgroupId=com.github.teamnewpipe \
            -DartifactId=NewPipeExtractor \
            -Dversion=$NPE_COMMIT \
            -Dpackaging=jar \
            --quiet

          echo "Maven local contents:"
          find ~/.m2/repository/com/github/teamnewpipe -type f

      - name: Build APK
        run: flutter build apk --flavor stable --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NYT-Music
          path: build/app/outputs/flutter-apk/app-stable-release.apk
