name: Build NYT Music APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          LASTFM_API_KEY=dummy
          LASTFM_API_SECRET=dummy
          ENABLE_UPDATE_CHECK=0
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Trigger and wait for JitPack to build NewPipeExtractor
        run: |
          COMMIT="e4e5ccc1fdef8afc684cf00cd01ecb19cc7ef4b0"
          POM_URL="https://jitpack.io/com/github/teamnewpipe/NewPipeExtractor/$COMMIT/NewPipeExtractor-$COMMIT.pom"
          LOG_URL="https://jitpack.io/com/github/teamnewpipe/NewPipeExtractor/$COMMIT/build.log"

          echo "Triggering JitPack build..."
          curl -s "$POM_URL" > /dev/null || true

          echo "Polling JitPack for up to 10 minutes..."
          for i in $(seq 1 20); do
            echo "=== Attempt $i/20 ==="
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$POM_URL")
            echo "HTTP Status for POM: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "JitPack artifact is ready!"
              break
            fi
            echo "Build log so far:"
            curl -s "$LOG_URL" | tail -10 || echo "(no log yet)"
            echo "Waiting 30s..."
            sleep 30
          done

      - name: Clear Gradle dependency cache for NewPipeExtractor
        run: |
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.github.teamnewpipe/ || true
          rm -rf ~/.gradle/caches/modules-2/metadata-2.1/ || true

      - name: Build APK
        run: flutter build apk --flavor stable --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NYT-Music
          path: build/app/outputs/flutter-apk/app-stable-release.apk
