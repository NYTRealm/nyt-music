name: Build NYT Music APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          LASTFM_API_KEY=dummy
          LASTFM_API_SECRET=dummy
          ENABLE_UPDATE_CHECK=0
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build NewPipeExtractor and publish to Maven local
        run: |
          NPE_COMMIT="e4e5ccc1fdef8afc684cf00cd01ecb19cc7ef4b0"

          git clone --depth=200 https://github.com/teamnewpipe/NewPipeExtractor /tmp/npe
          cd /tmp/npe
          git checkout $NPE_COMMIT
          chmod +x gradlew

          echo "=== Publishing NewPipeExtractor to Maven local ==="
          ./gradlew publishToMavenLocal -x test --no-daemon 2>&1 | tail -40

          echo "=== Maven local org.schabi contents ==="
          find ~/.m2/repository/org/schabi -type f | head -20

          # Find the JAR and version published by the project itself
          NPE_JAR=$(find ~/.m2/repository/org/schabi -name "*.jar" \
            ! -name "*sources*" ! -name "*javadoc*" | head -1)
          NPE_VERSION=$(find ~/.m2/repository/org/schabi -name "*.pom" | head -1 | \
            grep -oPm1 "(?<=<version>)[^<]+")
          echo "Published JAR : $NPE_JAR"
          echo "Published ver : $NPE_VERSION"

          # Verify JAR actually contains the extractor classes
          echo "=== Classes check ==="
          jar tf "$NPE_JAR" | grep "schabi/newpipe/extractor" | head -5

          # Patch the flutter_new_pipe_extractor plugin's build.gradle to use
          # the local Maven coordinates instead of the broken JitPack commit hash
          CACHE_DIR=$(find ~/.pub-cache/git -maxdepth 1 \
            -name "flutter_new_pipe_extractor*" -type d | head -1)
          echo "Plugin cache dir: $CACHE_DIR"

          sed -i \
            "s|com.github.teamnewpipe:NewPipeExtractor:[a-f0-9]*|org.schabi.newpipe:NewPipeExtractor:$NPE_VERSION|g" \
            "$CACHE_DIR/android/build.gradle"

          echo "=== Patched plugin build.gradle ==="
          cat "$CACHE_DIR/android/build.gradle"

      - name: Build APK
        run: flutter build apk --flavor stable --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NYT-Music
          path: build/app/outputs/flutter-apk/app-stable-release.apk
