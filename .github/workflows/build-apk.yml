name: Build NYT Music APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          LASTFM_API_KEY=dummy
          LASTFM_API_SECRET=dummy
          ENABLE_UPDATE_CHECK=0
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build NewPipeExtractor and publish to Maven local
        run: |
          NPE_COMMIT="e4e5ccc1fdef8afc684cf00cd01ecb19cc7ef4b0"

          git clone --depth=200 https://github.com/teamnewpipe/NewPipeExtractor /tmp/npe
          cd /tmp/npe
          git checkout $NPE_COMMIT
          chmod +x gradlew

          echo "=== Publishing NewPipeExtractor to Maven local ==="
          ./gradlew publishToMavenLocal -x test --no-daemon

          echo "=== Everything published to ~/.m2 ==="
          find ~/.m2 -type f 2>/dev/null | head -40

          # Find the POM and JAR (broad search — we don't know the group yet)
          NPE_POM=$(find ~/.m2 -name "*.pom" ! -path "*/wrapper*" 2>/dev/null | head -1)
          NPE_JAR=$(find ~/.m2 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)

          if [ -z "$NPE_POM" ] || [ -z "$NPE_JAR" ]; then
            echo "ERROR: publishToMavenLocal produced no artifacts. Full ~/.m2 listing:"
            find ~/.m2 -type f 2>/dev/null || echo "(nothing in ~/.m2)"
            exit 1
          fi

          echo "POM: $NPE_POM"
          echo "JAR: $NPE_JAR"
          cat "$NPE_POM"

          # Read actual coordinates from the POM
          GROUP=$(grep -m1 "<groupId>" "$NPE_POM"    | sed 's|.*<groupId>||;s|</groupId>.*||;s| ||g')
          ARTIFACT=$(grep -m1 "<artifactId>" "$NPE_POM" | sed 's|.*<artifactId>||;s|</artifactId>.*||;s| ||g')
          VERSION=$(grep -m1 "<version>" "$NPE_POM"  | sed 's|.*<version>||;s|</version>.*||;s| ||g')
          echo "Coordinates: $GROUP:$ARTIFACT:$VERSION"

          # Verify JAR has extractor classes
          echo "=== JAR class check ==="
          jar tf "$NPE_JAR" | grep -i "extractor\|schabi\|newpipe" | head -10

          # Patch the flutter_new_pipe_extractor plugin's build.gradle
          # to replace the broken JitPack commit with local Maven coordinates
          CACHE_DIR=$(find ~/.pub-cache/git -maxdepth 1 \
            -name "flutter_new_pipe_extractor*" -type d | head -1)
          echo "Plugin cache dir: $CACHE_DIR"
          sed -i \
            "s|com.github.teamnewpipe:NewPipeExtractor:[a-f0-9]*|$GROUP:$ARTIFACT:$VERSION|g" \
            "$CACHE_DIR/android/build.gradle"
          echo "=== Patched plugin build.gradle ==="
          cat "$CACHE_DIR/android/build.gradle"

      - name: Generate keystore for signing
        run: |
          keytool -genkey -v \
            -keystore /tmp/nyt-music-key.jks \
            -alias nytmusic \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nytmusicpass -keypass nytmusicpass \
            -dname "CN=NYT Music, OU=Music, O=NYT, L=Unknown, ST=Unknown, C=US"

          printf 'storePassword=nytmusicpass\nkeyPassword=nytmusicpass\nkeyAlias=nytmusic\nstoreFile=/tmp/nyt-music-key.jks\n' \
            > android/key.properties

      - name: Build APK
        run: flutter build apk --flavor stable --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NYT-Music
          path: build/app/outputs/flutter-apk/app-stable-release.apk
